<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=5.0, user-scalable=yes">
    <title>Chosen Generations — Chord Sheets</title>
    <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;0,700;1,300;1,400;1,600;1,700&family=DM+Sans:wght@300;400;500;600&family=DM+Mono:wght@400;500&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/pdf-lib/1.17.1/pdf-lib.min.js"></script>
    <style>
        :root {
            --bg: #0A0806;
            --bg2: #100D0A;
            --surface: #161210;
            --surface2: #1E1A17;
            --surface3: #252018;
            --text: #F0EAE0;
            --text2: #9A8E82;
            --text3: #5A5248;
            --gold: #C9A96E;
            --gold2: #E8C990;
            --gold-dim: rgba(201,169,110,0.12);
            --gold-glow: rgba(201,169,110,0.25);
            --border: rgba(201,169,110,0.12);
            --border2: rgba(240,234,224,0.06);
            --red: #E05C5C;
            --blue: #5C8AE0;
            --green: #6DBF8A;
            --radius: 12px;
            --radius-sm: 8px;
            --shadow-deep: 0 32px 80px rgba(0,0,0,0.8);
            --shadow-card: 0 8px 32px rgba(0,0,0,0.5);
            --transition: all 0.35s cubic-bezier(0.16,1,0.3,1);
        }

        [data-theme="light"] {
            --bg: #F5F0E8;
            --bg2: #EDE7DB;
            --surface: #FFFFFF;
            --surface2: #F8F4EE;
            --surface3: #F0EAE0;
            --text: #1A1410;
            --text2: #6B6058;
            --text3: #A89E94;
            --gold: #9A6E2A;
            --gold2: #C49040;
            --gold-dim: rgba(154,110,42,0.08);
            --gold-glow: rgba(154,110,42,0.2);
            --border: rgba(154,110,42,0.15);
            --border2: rgba(26,20,16,0.07);
            --shadow-deep: 0 32px 80px rgba(0,0,0,0.15);
            --shadow-card: 0 8px 32px rgba(0,0,0,0.08);
        }

        *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
        
        body, html {
            height: 100%; overflow: hidden;
            font-family: 'DM Sans', sans-serif;
            background: var(--bg);
            color: var(--text);
            -webkit-font-smoothing: antialiased;
            -moz-osx-font-smoothing: grayscale;
        }

        body::before {
            content: '';
            position: fixed; inset: 0; z-index: 9999;
            pointer-events: none; opacity: 0.025;
            background-image: url("data:image/svg+xml,%3Csvg viewBox='0 0 512 512' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noise'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='4' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noise)'/%3E%3C/svg%3E");
        }

        #landing {
            position: fixed; inset: 0; z-index: 200;
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            background: var(--bg); cursor: pointer;
            transition: transform 1.1s cubic-bezier(0.76,0,0.24,1), opacity 0.5s ease;
            overflow: hidden;
        }
        #landing.exit { transform: translateY(-100%); opacity: 0; }
        .landing-bg-lines {
            position: absolute; inset: 0;
            background: 
                repeating-linear-gradient(0deg, transparent, transparent 60px, var(--border) 60px, var(--border) 61px),
                repeating-linear-gradient(90deg, transparent, transparent 60px, var(--border) 60px, var(--border) 61px);
            opacity: 0.4;
        }
        .landing-center { position: relative; z-index: 2; display: flex; flex-direction: column; align-items: center; gap: 0; }
        .cross-scene { width: 72px; height: 96px; perspective: 600px; margin-bottom: 40px; }
        .cross-3d { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: spinY 12s linear infinite; }
        .cross-arm { position: absolute; background: linear-gradient(135deg, var(--gold2), var(--gold)); border-radius: 2px; }
        .cross-v { width: 14px; height: 96px; left: 29px; top: 0; }
        .cross-h { width: 58px; height: 14px; top: 26px; left: 7px; }
        @keyframes spinY { from { transform: rotateY(0); } to { transform: rotateY(360deg); } }
        .landing-eyebrow { font-size: 10px; letter-spacing: 0.4em; text-transform: uppercase; color: var(--gold); font-weight: 500; margin-bottom: 16px; }
        .landing-title { font-family: 'Cormorant Garamond', serif; font-size: clamp(52px, 12vw, 96px); font-weight: 300; line-height: 0.9; text-align: center; letter-spacing: -0.02em; color: var(--text); }
        .landing-title span { display: block; }
        .landing-title .accent { font-style: italic; color: var(--gold); }
        .landing-divider { width: 1px; height: 48px; background: linear-gradient(to bottom, transparent, var(--gold), transparent); margin: 32px auto; }
        .landing-cta { font-size: 10px; letter-spacing: 0.35em; text-transform: uppercase; color: var(--text2); animation: breathe 2.5s ease-in-out infinite; }
        @keyframes breathe { 0%,100%{opacity:0.3} 50%{opacity:1} }

        #app { display: flex; height: 100dvh; width: 100vw; overflow: hidden; }
        #overlay {
            position: fixed; inset: 0; z-index: 98; background: rgba(0,0,0,0.6);
            backdrop-filter: blur(8px); -webkit-backdrop-filter: blur(8px);
            opacity: 0; pointer-events: none; transition: opacity 0.3s ease;
        }
        #overlay.active { opacity: 1; pointer-events: auto; }

        #sidebar {
            position: fixed; left: 0; top: 0; bottom: 0; width: 320px; max-width: 88vw; z-index: 99;
            background: var(--surface); border-right: 1px solid var(--border);
            display: flex; flex-direction: column; transform: translateX(-100%);
            transition: transform 0.4s cubic-bezier(0.16,1,0.3,1); box-shadow: var(--shadow-deep);
        }
        #sidebar.open { transform: translateX(0); }

        .sb-head { padding: 28px 20px 20px; border-bottom: 1px solid var(--border); flex-shrink: 0; background: var(--surface); }
        .sb-brand-row { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 20px; }
        .sb-brand-name { font-family: 'Cormorant Garamond', serif; font-size: 26px; font-weight: 400; line-height: 1; color: var(--text); letter-spacing: 0.02em; }
        .sb-brand-sub { font-size: 10px; letter-spacing: 0.3em; text-transform: uppercase; color: var(--gold); margin-top: 4px; font-weight: 500; }
        .sb-actions { display: flex; gap: 8px; }

        .icon-btn {
            width: 36px; height: 36px; flex-shrink: 0; border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: transparent; color: var(--text2); display: flex; align-items: center; justify-content: center;
            cursor: pointer; transition: var(--transition); outline: none;
        }
        .icon-btn:hover { background: var(--surface2); color: var(--text); border-color: var(--border2); }
        .icon-btn svg { width: 16px; height: 16px; }

        .search-wrap { position: relative; }
        .search-ico { position: absolute; left: 12px; top: 50%; transform: translateY(-50%); width: 14px; height: 14px; opacity: 0.35; pointer-events: none; }
        .search-input {
            width: 100%; padding: 10px 12px 10px 36px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif;
            font-size: 14px; outline: none; transition: var(--transition);
        }
        .search-input::placeholder { color: var(--text3); }
        .search-input:focus { border-color: var(--gold); background: var(--surface3); box-shadow: 0 0 0 3px var(--gold-dim); }

        .sb-list { flex: 1; overflow-y: auto; padding: 12px 8px; -webkit-overflow-scrolling: touch; }
        .sb-list::-webkit-scrollbar { width: 3px; }
        .sb-list::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .folder { margin-bottom: 4px; }
        .folder-hd {
            display: flex; align-items: center; gap: 8px; padding: 10px 12px; border-radius: var(--radius-sm);
            cursor: pointer; font-size: 12px; font-weight: 500; color: var(--text2); letter-spacing: 0.02em;
            transition: var(--transition); user-select: none;
        }
        .folder-hd:hover { background: var(--surface2); color: var(--text); }
        .folder-hd svg { width: 14px; height: 14px; opacity: 0.5; flex-shrink: 0; }
        .folder-hd .chevron { margin-left: auto; width: 12px; height: 12px; opacity: 0.4; transition: transform 0.3s ease; flex-shrink: 0; }
        .folder.open .chevron { transform: rotate(90deg); }
        .folder-body { max-height: 0; overflow: hidden; opacity: 0; transition: max-height 0.45s ease, opacity 0.3s ease; }
        .folder.open .folder-body { max-height: 2000px; opacity: 1; }

        .song-row {
            display: flex; align-items: center; padding: 9px 12px 9px 30px; border-radius: var(--radius-sm); margin: 1px 0;
            cursor: pointer; font-size: 13px; color: var(--text2); transition: var(--transition); white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
        }
        .song-row:hover { background: var(--surface2); color: var(--text); }
        .song-row.active { background: var(--gold-dim); color: var(--gold2); font-weight: 500; border: 1px solid var(--border); }
        .song-row .cat-tag { font-size: 10px; color: var(--text3); margin-top: 2px; display: block; letter-spacing: 0.05em; text-transform: uppercase; }

        #viewer { flex: 1; display: flex; flex-direction: column; overflow: hidden; width: 100vw; background: var(--bg); }
        #topbar { height: 64px; flex-shrink: 0; display: flex; align-items: center; padding: 0 12px; gap: 10px; background: var(--surface); border-bottom: 1px solid var(--border); z-index: 5; }

        .menu-btn {
            width: 40px; height: 40px; flex-shrink: 0; border-radius: var(--radius-sm); border: 1px solid var(--border);
            background: transparent; color: var(--text); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition);
        }
        .menu-btn:hover { background: var(--surface2); }
        .menu-btn svg { width: 18px; height: 18px; }

        .song-info { flex: 1; overflow: hidden; }
        .song-info-title { font-size: 15px; font-weight: 500; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; line-height: 1.2; }
        .song-info-folder { font-size: 10px; color: var(--gold); text-transform: uppercase; letter-spacing: 0.15em; margin-top: 2px; }

        .toolbar {
            display: flex; align-items: center; gap: 4px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); padding: 4px; overflow-x: auto; -webkit-overflow-scrolling: touch; scrollbar-width: none; flex-shrink: 0;
        }
        .toolbar::-webkit-scrollbar { display: none; }

        .t-btn {
            width: 34px; height: 34px; flex-shrink: 0; border-radius: 6px; border: none; background: transparent;
            color: var(--text2); display: flex; align-items: center; justify-content: center; cursor: pointer; transition: var(--transition); position: relative;
        }
        .t-btn svg { width: 16px; height: 16px; stroke-width: 2; }
        .t-btn:hover { background: var(--surface3); color: var(--text); }
        .t-btn.on { background: var(--text); color: var(--bg); }
        .t-btn.gold-on { background: var(--gold); color: var(--bg); animation: goldPulse 2s infinite; }
        @keyframes goldPulse { 0%,100%{ box-shadow: 0 0 0 0 var(--gold-glow); } 50%{ box-shadow: 0 0 0 8px transparent; } }
        .t-sep { width: 1px; height: 20px; background: var(--border); flex-shrink: 0; margin: 0 2px; }

        .swatch { width: 18px; height: 18px; flex-shrink: 0; border-radius: 50%; cursor: pointer; border: 2px solid transparent; transition: transform 0.2s, border-color 0.2s; }
        .swatch:hover { transform: scale(1.2); }
        .swatch.on { border-color: var(--text); transform: scale(1.15); }

        .save-btn {
            padding: 7px 14px; flex-shrink: 0; background: transparent; border: 1px solid var(--gold); border-radius: 20px;
            color: var(--gold); font-family: 'DM Sans', sans-serif; font-size: 11px; font-weight: 500;
            letter-spacing: 0.1em; text-transform: uppercase; cursor: pointer; transition: var(--transition); white-space: nowrap;
        }
        .save-btn:hover { background: var(--gold); color: var(--bg); box-shadow: 0 4px 20px var(--gold-glow); }

        #bottombar {
            height: 60px; flex-shrink: 0; display: flex; align-items: center; justify-content: space-between; padding: 0 12px; gap: 8px;
            background: var(--surface); border-top: 1px solid var(--border); z-index: 5; opacity: 0; pointer-events: none; transition: opacity 0.3s;
        }
        #bottombar.visible { opacity: 1; pointer-events: auto; }
        .bb-group { display: flex; align-items: center; gap: 6px; }
        .page-nav-info { font-size: 12px; color: var(--text2); font-variant-numeric: tabular-nums; white-space: nowrap; }

        /* SCROLL SPEED CONTROLLER overlay */
        #speedCtrl {
            position: fixed; bottom: 80px; left: 50%; transform: translateX(-50%) translateY(20px);
            background: var(--surface); border: 1px solid var(--border); border-radius: 30px;
            padding: 10px 24px; display: flex; align-items: center; gap: 14px;
            box-shadow: var(--shadow-deep); opacity: 0; pointer-events: none; transition: var(--transition); z-index: 100;
        }
        #speedCtrl.active { opacity: 1; pointer-events: auto; transform: translateX(-50%) translateY(0); }
        .speed-lbl { font-size: 11px; font-weight: 600; color: var(--gold); text-transform: uppercase; letter-spacing: 0.15em; }
        .speed-slider { 
            -webkit-appearance: none; width: 140px; height: 4px; background: var(--surface3); 
            border-radius: 2px; outline: none; transition: opacity .2s;
        }
        .speed-slider::-webkit-slider-thumb { 
            -webkit-appearance: none; appearance: none; width: 18px; height: 18px; 
            border-radius: 50%; background: var(--gold); cursor: pointer; box-shadow: 0 2px 6px rgba(0,0,0,0.5);
        }

        /* CANVAS AREA - Fixed for zooming and side-by-side overflow */
        #canvasWrap {
            flex: 1; overflow: auto; /* ALLOW X AND Y SCROLL for zoom/overflow */
            display: flex; flex-direction: column;
            align-items: center; padding: 20px 16px; gap: 16px; background: var(--bg2); -webkit-overflow-scrolling: touch;
        }
        #canvasWrap::-webkit-scrollbar { width: 6px; height: 6px; }
        #canvasWrap::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        #pdfContainer { display: flex; flex-direction: column; align-items: center; gap: 16px; width: 100%; transition: none; }
        
        /* TWO UP Layout - Force horizontal flow and allow expansion */
        #pdfContainer.two-up { flex-direction: row; flex-wrap: nowrap; width: max-content; min-width: 100%; justify-content: center; padding: 0 8px; gap: 16px; }
        #pdfContainer.two-up .pdf-page-wrap { flex: 0 0 auto; margin: 0; }

        .pdf-page-wrap { position: relative; box-shadow: var(--shadow-card); border-radius: var(--radius); overflow: hidden; background: white; flex-shrink: 0; transition: box-shadow 0.3s; }
        .pdf-page-wrap canvas { display: block; max-width: 100%; height: auto !important; }
        .draw-layer { position: absolute; top: 0; left: 0; width: 100%; height: 100%; cursor: crosshair; touch-action: none; }
        .pan-mode .draw-layer { pointer-events: none !important; cursor: default; }

        #emptyState {
            position: absolute; inset: 0; display: flex; flex-direction: column; align-items: center; justify-content: center;
            padding: 40px; pointer-events: none; z-index: 2; text-align: center; transition: opacity 0.4s;
        }
        #emptyState.gone { opacity: 0; }

        .es-cross-scene { width: 72px; height: 96px; perspective: 600px; margin-bottom: 40px; opacity: 0.18; }
        .es-cross-3d { width: 100%; height: 100%; position: relative; transform-style: preserve-3d; animation: spinY 12s linear infinite; }
        .es-cross-arm { position: absolute; background: linear-gradient(135deg, var(--gold2), var(--gold)); border-radius: 2px; }
        .es-cross-v { width: 14px; height: 96px; left: 29px; top: 0; }
        .es-cross-h { width: 58px; height: 14px; top: 26px; left: 7px; }
        .es-verse { font-family: 'Cormorant Garamond', serif; font-size: clamp(18px, 4vw, 28px); font-style: italic; font-weight: 300; line-height: 1.5; color: var(--text); opacity: 0.5; max-width: 600px; margin-bottom: 12px; }
        .es-ref { font-size: 12px; letter-spacing: 0.2em; text-transform: uppercase; color: var(--gold); opacity: 0.7; }

        .spinner {
            display: inline-block; width: 16px; height: 16px; border: 2px solid var(--border); border-top-color: var(--gold);
            border-radius: 50%; animation: spin 0.8s linear infinite; vertical-align: middle; margin-right: 8px;
        }
        @keyframes spin { to { transform: rotate(360deg); } }

        .loading-msg { display: flex; align-items: center; color: var(--text2); font-size: 14px; padding: 60px; }
        .err-msg {
            color: var(--red); text-align: center; padding: 40px; max-width: 360px; margin: auto;
            background: rgba(224,92,92,0.06); border: 1px solid rgba(224,92,92,0.2); border-radius: var(--radius); font-size: 14px; line-height: 1.6;
        }

        @keyframes fadeUp { from { opacity: 0; transform: translateY(12px); } to { opacity: 1; transform: translateY(0); } }
        .fade-up { animation: fadeUp 0.4s ease backwards; }

        .sun-icon, .moon-icon { position: absolute; width: 16px; height: 16px; transition: var(--transition); }
        [data-theme="dark"] .sun-icon { opacity: 0; transform: scale(0.5); }
        [data-theme="dark"] .moon-icon { opacity: 1; transform: scale(1); }
        [data-theme="light"] .moon-icon { opacity: 0; transform: scale(0.5); }
        [data-theme="light"] .sun-icon { opacity: 1; transform: scale(1); }

        /* MODALS */
        .modal-overlay {
            position: fixed; inset: 0; z-index: 1000; background: rgba(0,0,0,0.6); backdrop-filter: blur(4px);
            display: none; align-items: center; justify-content: center; opacity: 0; transition: opacity 0.3s ease;
        }
        .modal-overlay.active { display: flex; opacity: 1; }
        .modal-card {
            background: var(--surface); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border);
            width: 90%; max-width: 400px; box-shadow: var(--shadow-deep); transform: translateY(20px); transition: transform 0.3s ease;
        }
        .modal-overlay.active .modal-card { transform: translateY(0); }
        .modal-title { font-family: 'Cormorant Garamond', serif; font-size: 24px; margin-bottom: 16px; color: var(--gold); }
        .modal-label { font-size: 12px; color: var(--text2); display: block; margin-bottom: 8px; font-weight: 500; }
        .modal-input {
            width: 100%; padding: 10px 12px; margin-bottom: 20px; background: var(--surface2); border: 1px solid var(--border);
            border-radius: var(--radius-sm); color: var(--text); font-family: 'DM Sans', sans-serif; outline: none; transition: var(--transition);
        }
        .modal-input:focus { border-color: var(--gold); background: var(--surface3); }
        .modal-actions { display: flex; justify-content: flex-end; gap: 8px; }
        .modal-btn {
            padding: 9px 18px; border-radius: var(--radius-sm); cursor: pointer; font-family: 'DM Sans', sans-serif;
            font-size: 13px; font-weight: 500; border: 1px solid transparent; transition: var(--transition);
        }
        .modal-btn.cancel { background: transparent; color: var(--text2); border-color: var(--border); }
        .modal-btn.cancel:hover { background: var(--surface2); color: var(--text); }
        .modal-btn.primary { background: var(--gold); color: var(--bg); }
        .modal-btn.primary:hover { box-shadow: 0 4px 15px var(--gold-glow); }

        @media (max-width: 480px) {
            .save-btn .save-text { display: none; }
            .save-btn::before { content: 'Save'; font-size: 11px; }
            #canvasWrap { padding: 12px 6px; }
        }
    </style>
</head>
<body>
<script>
    const d = window.matchMedia('(prefers-color-scheme: dark)').matches;
    document.body.setAttribute('data-theme', d ? 'dark' : 'light');
</script>

<div id="landing" onclick="enterApp()">
    <div class="landing-bg-lines"></div>
    <div class="landing-center">
        <div class="cross-scene">
            <div class="cross-3d">
                <div class="cross-arm cross-v"></div>
                <div class="cross-arm cross-h"></div>
            </div>
        </div>
        <div class="landing-eyebrow">Digital Songbook</div>
        <h1 class="landing-title"><span>Chosen</span><span class="accent">Generations</span></h1>
        <div class="landing-divider"></div>
        <div class="landing-cta">Tap anywhere to begin</div>
    </div>
</div>

<div id="app">
    <div id="overlay" onclick="closeSidebar()"></div>

    <aside id="sidebar">
        <div class="sb-head">
            <div class="sb-brand-row">
                <div class="sb-brand-text">
                    <div class="sb-brand-name">Chosen</div>
                    <div class="sb-brand-sub">Generations</div>
                </div>
                <div class="sb-actions">
                    <button class="icon-btn" onclick="openUploadModal()" title="Add new PDF">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    </button>
                    <button class="icon-btn" onclick="toggleTheme()" title="Toggle theme" style="position:relative">
                        <svg class="sun-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="5"/><line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/><line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/><line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/><line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/><line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/><line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/></svg>
                        <svg class="moon-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                </div>
            </div>
            <div class="search-wrap">
                <svg class="search-ico" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                <input id="searchInput" type="text" class="search-input" placeholder="Search songs…" oninput="handleSearch(this.value)">
            </div>
        </div>
        <div class="sb-list" id="songList"></div>
    </aside>

    <div id="viewer">
        <header id="topbar">
            <button class="menu-btn" onclick="openSidebar()">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                    <line x1="3" y1="6" x2="21" y2="6"/><line x1="3" y1="12" x2="21" y2="12"/><line x1="3" y1="18" x2="21" y2="18"/>
                </svg>
            </button>
            <div class="song-info" id="songInfo" style="opacity:0;transition:opacity 0.3s">
                <div class="song-info-title" id="songTitle">—</div>
                <div class="song-info-folder" id="songFolder"></div>
            </div>

            <div class="toolbar" id="toolbar" style="opacity:0;pointer-events:none;transition:opacity 0.3s">
                <button class="t-btn" id="btnMove" onclick="openMoveModal()" title="Move File">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
                        <path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/>
                        <line x1="8" y1="14" x2="16" y2="14"/>
                        <polyline points="13 11 16 14 13 17"/>
                    </svg>
                </button>
                <div class="t-sep"></div>

                <button class="t-btn" id="btnScroll" onclick="toggleAutoScroll()" title="Auto Scroll">
                    <svg id="iconPlay" viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg>
                    <svg id="iconPause" viewBox="0 0 24 24" fill="none" stroke="currentColor" style="display:none"><rect x="6" y="4" width="4" height="16"/><rect x="14" y="4" width="4" height="16"/></svg>
                </button>
                <div class="t-sep"></div>
                <button class="t-btn" id="btnTwoUp" onclick="toggleTwoUp()" title="Two pages side by side">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><rect x="2" y="3" width="9" height="18" rx="1"/><rect x="13" y="3" width="9" height="18" rx="1"/></svg>

                <div class="t-sep"></div>
                <button class="t-btn on" id="btnPan" onclick="setTool('pan')" title="Pan / Scroll">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 11V6a2 2 0 0 0-4 0v4"/><path d="M14 10V5a2 2 0 0 0-4 0v5"/><path d="M10 10.5V4a2 2 0 0 0-4 0v9.5"/><path d="M6 14v-1.5a2 2 0 0 0-4 0v4c0 4.4 3.6 8 8 8h2c4.4 0 8-3.6 8-8v-5.5a2 2 0 0 0-4 0v4"/></svg>
                </button>
                <button class="t-btn" id="btnPen" onclick="setTool('pen')" title="Pen">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg>
                </button>
                <button class="t-btn" id="btnHighlight" onclick="setTool('highlight')" title="Highlight">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg>
                </button>
                <button class="t-btn" id="btnEraser" onclick="setTool('eraser')" title="Eraser">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20"/><path d="M16 8L10 14"/></svg>
                </button>
                <div class="t-sep"></div>
                <div class="swatch on" style="background:#C9A96E" onclick="setColor('#C9A96E',this)"></div>
                <div class="swatch" style="background:#E05C5C" onclick="setColor('#E05C5C',this)"></div>
                <div class="swatch" style="background:#5C8AE0" onclick="setColor('#5C8AE0',this)"></div>
            </div>

            <button class="save-btn" id="saveBtn" onclick="saveAnnotations()" style="opacity:0;pointer-events:none;transition:opacity 0.3s;margin-left:8px">
                <span class="save-text">Save Notes</span>
            </button>
        </header>

        <div id="speedCtrl">
            <div class="speed-lbl">Speed</div>
            <input type="range" class="speed-slider" id="speedSlider" min="0.2" max="5" step="0.1" value="1" oninput="updateScrollSpeed(this.value)">
        </div>

        <div id="canvasWrap" class="pan-mode">
            <div id="emptyState">
                <div class="es-cross-scene">
                    <div class="es-cross-3d">
                        <div class="es-cross-arm es-cross-v"></div>
                        <div class="es-cross-arm es-cross-h"></div>
                    </div>
                </div>
                <div class="es-verse" id="esVerse"></div>
                <div class="es-ref" id="esRef"></div>
            </div>
            <div id="pdfContainer"></div>
        </div>

        <footer id="bottombar">
            <div class="bb-group">
                <button class="icon-btn" onclick="prevPage()" title="Previous page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="15 18 9 12 15 6"/></svg></button>
                <span class="page-nav-info" id="pageNavInfo">— / —</span>
                <button class="icon-btn" onclick="nextPage()" title="Next page"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg></button>
            </div>
            <div class="bb-group" style="gap:8px">
                <div class="toolbar" id="bottomToolbar">
                    <button class="t-btn" id="btnScroll2" onclick="toggleAutoScroll()" title="Auto Scroll"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><polygon points="5 3 19 12 5 21 5 3"/></svg></button>
                    <div class="t-sep"></div>
                    <button class="t-btn on" id="btnPan2" onclick="setTool('pan')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M18 11V6a2 2 0 0 0-4 0v4"/><path d="M14 10V5a2 2 0 0 0-4 0v5"/><path d="M10 10.5V4a2 2 0 0 0-4 0v9.5"/><path d="M6 14v-1.5a2 2 0 0 0-4 0v4c0 4.4 3.6 8 8 8h2c4.4 0 8-3.6 8-8v-5.5a2 2 0 0 0-4 0v4"/></svg></button>
                    <button class="t-btn" id="btnPen2" onclick="setTool('pen')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 19l7-7 3 3-7 7-3-3z"/><path d="M18 13l-1.5-7.5L2 2l3.5 14.5L13 18l5-5z"/></svg></button>
                    <button class="t-btn" id="btnHighlight2" onclick="setTool('highlight')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M12 20h9"/><path d="M16.5 3.5a2.121 2.121 0 0 1 3 3L7 19l-4 1 1-4L16.5 3.5z"/></svg></button>
                    <button class="t-btn" id="btnEraser2" onclick="setTool('eraser')"><svg viewBox="0 0 24 24" fill="none" stroke="currentColor"><path d="M20 20H7L3 16C2.5 15.5 2.5 14.5 3 14L13 4C13.5 3.5 14.5 3.5 15 4L20 9C20.5 9.5 20.5 10.5 20 11L11 20"/><path d="M16 8L10 14"/></svg></button>
                    <div class="t-sep"></div>
                    <div class="swatch on" style="background:#C9A96E" onclick="setColor('#C9A96E',this)"></div>
                    <div class="swatch" style="background:#E05C5C" onclick="setColor('#E05C5C',this)"></div>
                    <div class="swatch" style="background:#5C8AE0" onclick="setColor('#5C8AE0',this)"></div>
                </div>
                <button class="save-btn" onclick="saveAnnotations()"><span class="save-text">Save</span></button>
            </div>
        </footer>
    </div>
</div>

        <input type="file" id="uploadFileInput" accept="application/pdf" class="modal-input" style="padding: 6px;">

            <button class="modal-btn primary" id="moveActionBtn" onclick="executeMove()">Move File</button>

<script>
    pdfjsLib.GlobalWorkerOptions.workerSrc = 'https://cdnjs.cloudflare.com/ajax/libs/pdf.js/3.11.174/pdf.worker.min.js';
    
    // 🔥 REPLACE THIS WITH YOUR NEW WEB APP URL 🔥
    const SCRIPT_URL = 'https://script.google.com/macros/s/AKfycbxXYhO4lvB5KlpcjbVJQius0KqXB6DkWkgDWXE0tHjuBeYwWnjqsSbJ2kVbuFtzrWvH/exec';

    // State
    let allSongs = [], groupedSongs = {};
    let currentFile = null, pdfDoc = null;
    let currentTool = 'pan', currentColor = '#C9A96E';
    let drawCtxs = {}, isDrawing = false;
    let twoUpMode = false;
    let currentPage = 1, totalPages = 0;
    let renderedPages = new Set();
    
    // Auto Scroll State
    let autoScrollReq = null;
    let lastScrollTime = 0;
    let scrollSpeed = 1; 
    let scrollAccumulator = 0;

    // Bible verses
    const verses = [
        { text: "Come, let us bow down in worship, let us kneel before the Lord our Maker.", ref: "Psalm 95:6" },
        { text: "Worship the Lord with gladness; come before him with joyful songs.", ref: "Psalm 100:2" },
        { text: "Let everything that has breath praise the Lord. Praise the Lord.", ref: "Psalm 150:6" },
        { text: "Sing to the Lord a new song; sing to the Lord, all the earth.", ref: "Psalm 96:1" },
        { text: "Shout for joy to the Lord, all the earth, burst into jubilant song with music.", ref: "Psalm 98:4" },
        { text: "Through Jesus, let us continually offer to God a sacrifice of praise — the fruit of lips that openly profess his name.", ref: "Hebrews 13:15" },
    ];
    const v = verses[Math.floor(Math.random() * verses.length)];
    document.getElementById('esVerse').textContent = `"${v.text}"`;
    document.getElementById('esRef').textContent = `— ${v.ref}`;

    // ── LANDING ──
    function enterApp() {
        document.getElementById('landing').classList.add('exit');
        setTimeout(() => {
            document.getElementById('landing').style.display = 'none';
            openSidebar();
            loadLibrary();
        }, 600);
    }

    // ── SIDEBAR ──
    function openSidebar() {
        document.getElementById('sidebar').classList.add('open');
        document.getElementById('overlay').classList.add('active');
    }
    function closeSidebar() {
        document.getElementById('sidebar').classList.remove('open');
        document.getElementById('overlay').classList.remove('active');
    }
    function toggleSidebar() {
        document.getElementById('sidebar').classList.contains('open') ? closeSidebar() : openSidebar();
    }
    function toggleTheme() {
        const current = document.body.getAttribute('data-theme');
        document.body.setAttribute('data-theme', current === 'dark' ? 'light' : 'dark');
    }

    // ── LIBRARY ──
    async function loadLibrary() {
        const listEl = document.getElementById('songList');
        if(!allSongs.length) listEl.innerHTML = '<div class="loading-msg"><span class="spinner"></span>Syncing library…</div>';
        try {
            const res = await fetch(SCRIPT_URL);
            const data = await res.json();
            
            // If the backend sent an error, throw it so we can see it
            if (data.error) throw new Error("Backend Error: " + data.error);
            
            allSongs = data;
            allSongs.sort((a, b) => a.name.localeCompare(b.name));
            groupedSongs = {};
            allSongs.forEach(s => {
                const folder = s.category === 'CG' ? 'General' : s.category;
                if (!groupedSongs[folder]) groupedSongs[folder] = [];
                groupedSongs[folder].push(s);
            });
            renderFolders(Object.keys(groupedSongs).sort());
            updateDatalists();
        } catch (e) {
            console.error(e); 
            listEl.innerHTML = `<div style="color:var(--red);padding:24px;text-align:center;font-size:13px">Failed to sync.<br><br>${e.message}</div>`;
        }
    }

    function renderFolders(names) {
        const listEl = document.getElementById('songList');
        listEl.innerHTML = '';
        names.forEach((name, i) => {
            const wrap = document.createElement('div');
            wrap.className = 'folder fade-up';
            wrap.style.animationDelay = (i * 0.04) + 's';
            if(currentFile && (currentFile.category === name || (name === 'General' && currentFile.category === 'CG'))) {
                wrap.classList.add('open');
            }

            const hd = document.createElement('div');
            hd.className = 'folder-hd';
            hd.innerHTML = `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M22 19a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h5l2 3h9a2 2 0 0 1 2 2z"/></svg>${name}<svg class="chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><polyline points="9 18 15 12 9 6"/></svg>`;
            hd.onclick = () => wrap.classList.toggle('open');

            const body = document.createElement('div');
            body.className = 'folder-body';

            groupedSongs[name].forEach(song => {
                const clean = song.name.replace(/\.[^/.]+$/, '');
                const el = document.createElement('div');
                el.className = 'song-row';
                if(currentFile && currentFile.id === song.id) el.classList.add('active');
                el.textContent = clean;
                el.onclick = () => { loadSong(el, song, clean, name); closeSidebar(); };
                body.appendChild(el);
            });

            wrap.appendChild(hd); wrap.appendChild(body);
            listEl.appendChild(wrap);
        });
    }

    function handleSearch(q) {
        const lq = q.toLowerCase();
        if (!lq) return renderFolders(Object.keys(groupedSongs).sort());
        const listEl = document.getElementById('songList');
        listEl.innerHTML = '';
        allSongs.filter(s => s.name.toLowerCase().includes(lq)).forEach(song => {
            const clean = song.name.replace(/\.[^/.]+$/, '');
            const folder = song.category === 'CG' ? 'General' : song.category;
            const el = document.createElement('div');
            el.className = 'song-row fade-up';
            el.innerHTML = `${clean}<span class="cat-tag">${folder}</span>`;
            el.onclick = () => { loadSong(el, song, clean, folder); closeSidebar(); };
            listEl.appendChild(el);
        });
    }

    function updateDatalists() {
        const folders = Object.keys(groupedSongs).sort();
        let optionsHtml = '';
        folders.forEach(f => { optionsHtml += `<option value="${f}">`; });
        document.getElementById('folderListOptions').innerHTML = optionsHtml;
        document.getElementById('folderListOptionsMove').innerHTML = optionsHtml;
    }

    // ── TOOL MANAGEMENT ──
    const TOOL_BTNS = { pan: ['btnPan','btnPan2'], pen: ['btnPen','btnPen2'], highlight: ['btnHighlight','btnHighlight2'], eraser: ['btnEraser','btnEraser2'] };
    function setTool(t) {
        currentTool = t;
        Object.keys(TOOL_BTNS).forEach(key => { TOOL_BTNS[key].forEach(id => { const btn = document.getElementById(id); if (btn) btn.classList.toggle('on', key === t); }); });
        document.getElementById('canvasWrap').classList.toggle('pan-mode', t === 'pan');
    }

    function setColor(c, el) {
        currentColor = c;
        document.querySelectorAll('.swatch').forEach(s => s.classList.remove('on'));
        document.querySelectorAll('.swatch').forEach(s => { if (s.style.background === c || s.style.background.replace(/\s/g,'') === c) s.classList.add('on'); });
        if (currentTool === 'pan' || currentTool === 'eraser') setTool('pen');
    }

    function toggleTwoUp() {
        twoUpMode = !twoUpMode;
        document.getElementById('btnTwoUp').classList.toggle('on', twoUpMode);
        document.getElementById('pdfContainer').classList.toggle('two-up', twoUpMode);
        if (pdfDoc) reRenderAll();
    }

    // ── ADJUSTABLE AUTO SCROLL ──
    function updateScrollSpeed(val) {
        scrollSpeed = parseFloat(val);
    }

    function autoScrollLoop(timestamp) {
        if (!lastScrollTime) lastScrollTime = timestamp;
        const delta = timestamp - lastScrollTime;
        lastScrollTime = timestamp;

        // Base scrolling formula (20px per second * speed multiplier)
        scrollAccumulator += (20 * scrollSpeed) * (delta / 1000);
        
        if (scrollAccumulator >= 1) {
            const step = Math.floor(scrollAccumulator);
            document.getElementById('canvasWrap').scrollBy({ top: step });
            scrollAccumulator -= step;
        }
        autoScrollReq = requestAnimationFrame(autoScrollLoop);
    }

    function toggleAutoScroll() {
        const cw = document.getElementById('canvasWrap');
        const btnS = document.getElementById('btnScroll'), btnS2 = document.getElementById('btnScroll2');
        const iconPlay = document.getElementById('iconPlay'), iconPause = document.getElementById('iconPause');
        const speedCtrl = document.getElementById('speedCtrl');

        if (autoScrollReq) {
            // STOP
            cancelAnimationFrame(autoScrollReq); autoScrollReq = null;
            btnS.classList.remove('gold-on'); btnS2.classList.remove('gold-on');
            if (iconPlay) { iconPlay.style.display = 'block'; iconPause.style.display = 'none'; }
            speedCtrl.classList.remove('active');
        } else {
            // START
            btnS.classList.add('gold-on'); btnS2.classList.add('gold-on');
            if (iconPlay) { iconPlay.style.display = 'none'; iconPause.style.display = 'block'; }
            speedCtrl.classList.add('active');
            
            // Sync slider value with internal state if it was moved previously
            scrollSpeed = parseFloat(document.getElementById('speedSlider').value);
            
            lastScrollTime = performance.now();
            autoScrollReq = requestAnimationFrame(autoScrollLoop);
        }
    }

    // ── PAGE NAV ──
    function updatePageNav() { document.getElementById('pageNavInfo').textContent = `${currentPage} / ${totalPages}`; }
    function goToPage(p) {
        if (!pdfDoc || p < 1 || p > totalPages) return;
        currentPage = p; updatePageNav();
        const pages = document.getElementById('pdfContainer').querySelectorAll('.pdf-page-wrap');
        if (pages[p - 1]) pages[p - 1].scrollIntoView({ behavior: 'smooth', block: 'start' });
    }
    function prevPage() { goToPage(currentPage - (twoUpMode ? 2 : 1)); }
    function nextPage() { goToPage(currentPage + (twoUpMode ? 2 : 1)); }

    function setupPageTracking() {
        const cw = document.getElementById('canvasWrap');
        cw.addEventListener('scroll', () => {
            const pages = document.getElementById('pdfContainer').querySelectorAll('.pdf-page-wrap');
            const cwRect = cw.getBoundingClientRect();
            let closest = 0, minDist = Infinity;
            pages.forEach((pg, i) => {
                const dist = Math.abs(pg.getBoundingClientRect().top - cwRect.top);
                if (dist < minDist) { minDist = dist; closest = i; }
            });
            currentPage = closest + 1; updatePageNav();
        }, { passive: true });
    }

    // ── LOAD SONG ──
    async function loadSong(el, song, name, folder) {
        document.querySelectorAll('.song-row').forEach(r => r.classList.remove('active'));
        if(el) el.classList.add('active');

        document.getElementById('songInfo').style.opacity = '1';
        document.getElementById('toolbar').style.opacity = '1';
        document.getElementById('toolbar').style.pointerEvents = 'auto';
        document.getElementById('saveBtn').style.opacity = '1';
        document.getElementById('saveBtn').style.pointerEvents = 'auto';
        document.getElementById('bottombar').classList.add('visible');
        document.getElementById('songTitle').textContent = name;
        document.getElementById('songFolder').textContent = folder;
        document.getElementById('emptyState').classList.add('gone');

        const container = document.getElementById('pdfContainer');
        container.innerHTML = '<div class="loading-msg"><span class="spinner"></span>Rendering…</div>';
        currentFile = song; drawCtxs = {}; pdfDoc = null; totalPages = 0; currentPage = 1; renderedPages.clear();

        if (autoScrollReq) toggleAutoScroll();

        try {
            const res = await fetch(`${SCRIPT_URL}?action=download&id=${song.id}`);
            const data = await res.json();
            if (!data.data) throw new Error('Missing PDF data');
            const bytes = Uint8Array.from(atob(data.data.replace(/[^A-Za-z0-9+/=]/g, '')), c => c.charCodeAt(0));
            pdfDoc = await pdfjsLib.getDocument({ data: bytes }).promise;
            totalPages = pdfDoc.numPages;
            container.innerHTML = '';
            container.classList.toggle('two-up', twoUpMode);

            for (let p = 1; p <= totalPages; p++) await renderPage(p);
            updatePageNav(); setTool('pan');
        } catch (err) {
            container.innerHTML = `<div class="err-msg">Error loading document:<br>${err.message}</div>`;
        }
    }

    async function reRenderAll() {
        if (!pdfDoc) return;
        const container = document.getElementById('pdfContainer');
        container.innerHTML = ''; container.classList.toggle('two-up', twoUpMode);
        drawCtxs = {};
        for (let p = 1; p <= totalPages; p++) await renderPage(p);
    }

    async function renderPage(pageNum) {
        const page = await pdfDoc.getPage(pageNum);
        const container = document.getElementById('pdfContainer');
        
        // ── SCALING LOGIC FOR TWO-UP & ZOOMING ──
        let targetWidth;
        if (twoUpMode) {
            // Force a minimum width per page so it is always readable side-by-side
            // It will overflow horizontally on small screens allowing native pinch-zoom/pan
            targetWidth = Math.max(Math.floor((container.clientWidth - 32) / 2), 350); 
        } else {
            targetWidth = Math.min(container.clientWidth - 4, 900);
        }

        const baseVp = page.getViewport({ scale: 1 });
        const scale = targetWidth / baseVp.width;
        const vp = page.getViewport({ scale });

        const wrap = document.createElement('div');
        wrap.className = 'pdf-page-wrap fade-up';
        wrap.style.animationDelay = ((pageNum - 1) * 0.05) + 's';
        wrap.style.width = vp.width + 'px'; wrap.style.height = vp.height + 'px';
        container.appendChild(wrap);

        const dpr = Math.min(window.devicePixelRatio || 1, 2);
        const pdfCvs = document.createElement('canvas');
        pdfCvs.style.width = vp.width + 'px'; pdfCvs.style.height = vp.height + 'px';
        pdfCvs.width = vp.width * dpr; pdfCvs.height = vp.height * dpr;
        const pdfCtx = pdfCvs.getContext('2d'); pdfCtx.scale(dpr, dpr);
        wrap.appendChild(pdfCvs);

        const drawCvs = document.createElement('canvas');
        drawCvs.className = 'draw-layer';
        drawCvs.style.width = vp.width + 'px'; drawCvs.style.height = vp.height + 'px';
        drawCvs.width = vp.width; drawCvs.height = vp.height;
        wrap.appendChild(drawCvs);

        const ctx = drawCvs.getContext('2d'); drawCtxs[pageNum] = ctx;
        attachDraw(drawCvs, ctx);

        await page.render({ canvasContext: pdfCtx, viewport: vp }).promise;
    }

    function attachDraw(canvas, ctx) {
        let drawing = false;
        const pos = (e) => {
            const r = canvas.getBoundingClientRect();
            const cx = e.touches ? e.touches[0].clientX : e.clientX;
            const cy = e.touches ? e.touches[0].clientY : e.clientY;
            return { x: (cx - r.left) * (canvas.width / r.width), y: (cy - r.top) * (canvas.height / r.height) };
        };
        const down = (e) => {
            if (currentTool === 'pan') return;
            drawing = true; const { x, y } = pos(e);
            ctx.beginPath(); ctx.moveTo(x, y); if (e.cancelable) e.preventDefault();
        };
        const move = (e) => {
            if (!drawing || currentTool === 'pan') return;
            const { x, y } = pos(e);
            ctx.lineCap = 'round'; ctx.lineJoin = 'round';
            if (currentTool === 'eraser') { ctx.globalCompositeOperation = 'destination-out'; ctx.lineWidth = 32; ctx.strokeStyle = 'rgba(0,0,0,1)'; }
            else if (currentTool === 'highlight') { ctx.globalCompositeOperation = 'source-over'; ctx.lineWidth = 22; ctx.strokeStyle = currentColor + '50'; }
            else { ctx.globalCompositeOperation = 'source-over'; ctx.lineWidth = 3; ctx.strokeStyle = currentColor; }
            ctx.lineTo(x, y); ctx.stroke(); ctx.beginPath(); ctx.moveTo(x, y);
            if (e.cancelable) e.preventDefault();
        };
        const up = () => { drawing = false; ctx.globalCompositeOperation = 'source-over'; };

        canvas.addEventListener('mousedown', down); canvas.addEventListener('mousemove', move); canvas.addEventListener('mouseup', up); canvas.addEventListener('mouseleave', up);
        canvas.addEventListener('touchstart', down, { passive: false }); canvas.addEventListener('touchmove', move, { passive: false }); canvas.addEventListener('touchend', up);
    }

    // ── MODALS (Upload / Move) ──
    function openModal(id) { document.getElementById(id).classList.add('active'); }
    function closeModal(id) { document.getElementById(id).classList.remove('active'); }

    function openUploadModal() {
        closeSidebar();
        document.getElementById('uploadFileInput').value = "";
        document.getElementById('uploadFolderInput').value = "";
        openModal('uploadModal');
    }

    function openMoveModal() {
        if(!currentFile) return;
        document.getElementById('moveFolderInput').value = '';
        openModal('moveModal');
    }

    async function executeUpload() {
        const fileInput = document.getElementById('uploadFileInput');
        const folderName = document.getElementById('uploadFolderInput').value.trim() || 'General';
        if(fileInput.files.length === 0) return alert('Please select a file to upload.');
        
        const file = fileInput.files[0];
        const btn = document.getElementById('uploadActionBtn');
        const origText = btn.innerText;
        btn.innerHTML = '<span class="spinner"></span> Uploading...'; btn.disabled = true;

        const reader = new FileReader();
        reader.onload = async function() {
            try {
                const req = await fetch(SCRIPT_URL, {
                    method: 'POST',
                    headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                    body: JSON.stringify({ action: 'uploadFile', destFolder: folderName, fileName: file.name, data: reader.result })
                });
                const res = await req.json();
                if(res.success) {
                    closeModal('uploadModal'); await loadLibrary();
                    const uploadedSong = allSongs.find(s => s.id === res.id);
                    if(uploadedSong) loadSong(null, uploadedSong, uploadedSong.name.replace(/\.[^/.]+$/, ''), res.category);
                } else throw new Error(res.error);
            } catch (err) { alert('Upload failed: ' + err.message); } finally { btn.innerHTML = origText; btn.disabled = false; }
        };
        reader.readAsDataURL(file);
    }

    async function executeMove() {
        if(!currentFile) return;
        const newFolder = document.getElementById('moveFolderInput').value.trim() || 'General';
        const btn = document.getElementById('moveActionBtn');
        const origText = btn.innerText;
        btn.innerHTML = '<span class="spinner"></span> Moving...'; btn.disabled = true;

        try {
            const req = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' },
                body: JSON.stringify({ action: 'moveFile', fileId: currentFile.id, destFolder: newFolder })
            });
            const res = await req.json();
            if(res.success) {
                currentFile.category = res.category;
                document.getElementById('songFolder').textContent = res.category;
                closeModal('moveModal'); await loadLibrary();
            } else throw new Error(res.error);
        } catch (err) { alert('Move failed: ' + err.message); } finally { btn.innerHTML = origText; btn.disabled = false; }
    }

    // ── SAVE TO DRIVE ──
    async function saveAnnotations() {
        if (!currentFile || !pdfDoc) return;
        const btnList = document.querySelectorAll('.save-btn');
        const origHTMLs = Array.from(btnList).map(b => b.innerHTML);
        
        btnList.forEach(btn => {
            btn.innerHTML = '<span class="spinner" style="border-top-color:var(--gold)"></span>';
            btn.style.pointerEvents = 'none';
        });

        try {
            const res = await fetch(`${SCRIPT_URL}?action=download&id=${currentFile.id}`);
            const data = await res.json();
            const pdfBytes = Uint8Array.from(atob(data.data.replace(/[^A-Za-z0-9+/=]/g, '')), c => c.charCodeAt(0));
            const pdfLibDoc = await PDFLib.PDFDocument.load(pdfBytes);
            const libPages = pdfLibDoc.getPages();

            for (let pg = 1; pg <= libPages.length; pg++) {
                const dc = drawCtxs[pg]; if (!dc) continue;
                const url = dc.canvas.toDataURL('image/png');
                if (url === 'data:,') continue;
                const img = await pdfLibDoc.embedPng(url);
                const { width, height } = libPages[pg - 1].getSize();
                libPages[pg - 1].drawImage(img, { x: 0, y: 0, width, height });
            }

            const savedBase64 = await pdfLibDoc.saveAsBase64({ dataUri: true });
            
            const saveReq = await fetch(SCRIPT_URL, {
                method: 'POST',
                headers: { 'Content-Type': 'text/plain;charset=utf-8' }, 
                body: JSON.stringify({ action: 'savePdf', id: currentFile.id, name: currentFile.name, data: savedBase64 })
            });
            const saveRes = await saveReq.json();
            if (saveRes.success) {
                currentFile.id = saveRes.newId;
                btnList.forEach(btn => { btn.innerHTML = '<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" style="width:16px;height:16px"><polyline points="20 6 9 17 4 12"/></svg>'; });
                setTimeout(() => { btnList.forEach((btn, i) => { btn.innerHTML = origHTMLs[i]; btn.style.pointerEvents = 'auto'; }); }, 2000);
            } else { throw new Error(saveRes.error); }

        } catch (e) {
            alert('Save failed: ' + e.message);
            btnList.forEach((btn, i) => { btn.innerHTML = origHTMLs[i]; btn.style.pointerEvents = 'auto'; });
        }
    }

    setupPageTracking();
</script>
